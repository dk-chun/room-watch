name: Naver check
# 결론(2026-07-10): Azure IP는 net::ERR_CONNECTION_RESET으로 네이버가 네트워크 레벨 차단.
# CI 자동수집 불가 판정됨. 이 잡은 재검증용으로만 남김(수동 실행 전용).
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable
      - name: 네이버 in-page fetch 200 확인
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: node naver_check.mjs
